<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa Kolejowa — Koleje Królewskie</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:    #c0392b;
      --blue:   #2471a3;
      --navy:   #1a2545;
      --gold:   #d4ac0d;
      --gray:   #7f8c8d;
      --bg:     #f5f0e8;
      --panel:  #ffffffee;
      --border: #d0c8b8;
      --text:   #1a1a1a;
    }

    html, body {
      height: 100%;
      font-family: 'Barlow', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── Header ── */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 20px;
      height: 56px;
      background: var(--navy);
      border-bottom: 3px solid var(--red);
      box-shadow: 0 2px 12px #0004;
    }

    #header .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
      color: #fff;
      line-height: 1;
    }

    #header .logo span {
      color: var(--red);
    }

    #header .subtitle {
      font-size: 11px;
      color: #aab;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border-left: 1px solid #ffffff30;
      padding-left: 16px;
    }

    #header .badge {
      margin-left: auto;
      font-size: 10px;
      background: var(--red);
      color: #fff;
      padding: 3px 10px;
      border-radius: 2px;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 600;
    }

    /* ── Map ── */
    #map {
      position: fixed;
      top: 56px; bottom: 0; left: 0; right: 0;
      background: var(--bg);
    }

    /* ── Legend ── */
    #legend {
      position: absolute;
      bottom: 24px;
      left: 16px;
      z-index: 900;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 14px 18px;
      min-width: 200px;
      box-shadow: 0 4px 20px #0002;
    }

    #legend h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 15px;
      letter-spacing: 2px;
      color: var(--navy);
      margin-bottom: 10px;
      border-bottom: 2px solid var(--red);
      padding-bottom: 6px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 7px;
      font-size: 12px;
    }

    .legend-line {
      width: 28px;
      height: 4px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid var(--navy);
      flex-shrink: 0;
    }

    .legend-interchange {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 3px solid var(--navy);
      flex-shrink: 0;
    }

    /* ── Info panel ── */
    #info-panel {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 900;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px 20px;
      min-width: 220px;
      max-width: 280px;
      box-shadow: 0 4px 20px #0002;
      display: none;
    }

    #info-panel h4 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 1.5px;
      color: var(--navy);
      margin-bottom: 4px;
    }

    #info-panel .info-type {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--gray);
      margin-bottom: 10px;
    }

    #info-panel .info-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
    }

    #info-panel .info-row:last-child { border-bottom: none; }

    #info-panel .info-label { color: var(--gray); }
    #info-panel .info-value { font-weight: 600; color: var(--navy); }

    #info-close {
      float: right;
      cursor: pointer;
      font-size: 16px;
      color: var(--gray);
      line-height: 1;
      margin-top: -2px;
    }

    #info-close:hover { color: var(--red); }

    /* ── Leaflet overrides ── */
    .leaflet-container {
      font-family: 'Barlow', sans-serif;
      background: var(--bg) !important;
    }

    .leaflet-control-zoom a {
      font-family: 'Barlow', sans-serif;
      font-weight: 600;
      color: var(--navy);
      border-color: var(--border) !important;
    }

    .leaflet-control-zoom a:hover {
      background: var(--navy);
      color: #fff;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 4px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 20px #0002;
      font-family: 'Barlow', sans-serif;
    }

    .leaflet-popup-content {
      font-size: 13px;
      color: var(--text);
    }

    .popup-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 17px;
      letter-spacing: 1px;
      color: var(--navy);
      margin-bottom: 2px;
    }

    .popup-type {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--gray);
    }
  </style>
</head>
<body>

<div id="header">
  <div class="logo">Koleje <span>Królewskie</span></div>
  <div class="subtitle">Mapa Sieci Kolejowej KDP 2025</div>
  <div class="badge">Sieć Krajowa</div>
</div>

<div id="map"></div>

<div id="legend">
  <h3>Legenda</h3>

  <div class="legend-item">
    <div class="legend-line" style="background:#c0392b"></div>
    <span>KDP-1 Linia Północna</span>
  </div>
  <div class="legend-item">
    <div class="legend-line" style="background:#2471a3"></div>
    <span>KDP-2 Linia Wschodnia</span>
  </div>
  <div class="legend-item">
    <div class="legend-line" style="background:#6c3483"></div>
    <span>KDP-3 Linia Centralna</span>
  </div>
  <div class="legend-item">
    <div class="legend-line" style="background:#d4ac0d"></div>
    <span>KDP-4 Linia Południowa</span>
  </div>
  <div class="legend-item">
    <div class="legend-line" style="background:#1e8449"></div>
    <span>Linia Regionalna</span>
  </div>

  <div style="margin: 10px 0 6px; font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--gray)">Stacje</div>

  <div class="legend-item">
    <div class="legend-interchange"></div>
    <span>Stacja Węzłowa</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot"></div>
    <span>Stacja Główna</span>
  </div>
  <div class="legend-item">
    <div style="width:8px;height:8px;border-radius:50%;background:var(--navy);flex-shrink:0"></div>
    <span>Przystanek</span>
  </div>
</div>

<div id="info-panel">
  <span id="info-close" onclick="closeInfo()">✕</span>
  <div id="info-name" class="popup-name"></div>
  <div id="info-type" class="info-type"></div>
  <div id="info-rows"></div>
</div>

<script>
// ── Map init ──────────────────────────────────────────────────────────────────
const map = L.map('map', {
  crs: L.CRS.Simple,         // flat projection — perfect for fictional maps
  minZoom: -3,
  maxZoom: 10,
  zoomControl: true,
});

// ── Load your GeoJSON ─────────────────────────────────────────────────────────
// Replace 'railway.geojson' with the path to your exported JOSM file.
// If it's in the same folder as this HTML, just keep the filename.
const GEOJSON_PATH = 'railway.geojson';

// ── Line colour mapping ───────────────────────────────────────────────────────
// Edit these to match the `name` or `ref` tags you set in JOSM.
const LINE_COLORS = {
  'KDP-1': '#c0392b',
  'KDP-2': '#2471a3',
  'KDP-3': '#6c3483',
  'KDP-4': '#d4ac0d',
  'regional': '#1e8449',
  'default': '#555555',
};

function getLineColor(props) {
  if (!props) return LINE_COLORS.default;
  const ref = props.ref || props.name || '';
  for (const key of Object.keys(LINE_COLORS)) {
    if (ref.includes(key)) return LINE_COLORS[key];
  }
  return LINE_COLORS.default;
}

// ── Station marker style ──────────────────────────────────────────────────────
function stationIcon(type) {
  const sizes = {
    interchange: { r: 9, stroke: 3 },
    main:        { r: 6, stroke: 2 },
    stop:        { r: 4, stroke: 1.5 },
  };
  const s = sizes[type] || sizes.stop;
  return L.circleMarker([0,0], {
    radius: s.r,
    color: '#1a2545',
    weight: s.stroke,
    fillColor: type === 'interchange' ? '#fff' : '#1a2545',
    fillOpacity: 1,
  });
}

// ── Info panel ────────────────────────────────────────────────────────────────
function showInfo(props) {
  const panel = document.getElementById('info-panel');
  document.getElementById('info-name').textContent = props.name || 'Bez nazwy';

  const typeMap = {
    station: 'Stacja Kolejowa',
    halt: 'Przystanek',
    junction: 'Węzeł',
    rail: 'Linia KDP',
  };
  document.getElementById('info-type').textContent =
    typeMap[props.railway] || props.railway || '';

  const skip = ['name','railway'];
  const rows = Object.entries(props)
    .filter(([k,v]) => !skip.includes(k) && v != null && v !== '')
    .map(([k,v]) => `
      <div class="info-row">
        <span class="info-label">${k}</span>
        <span class="info-value">${v}</span>
      </div>`)
    .join('');

  document.getElementById('info-rows').innerHTML = rows || '<div class="info-row"><span class="info-label">Brak danych</span></div>';
  panel.style.display = 'block';
}

function closeInfo() {
  document.getElementById('info-panel').style.display = 'none';
}

// ── GeoJSON rendering ─────────────────────────────────────────────────────────
fetch(GEOJSON_PATH)
  .then(r => {
    if (!r.ok) throw new Error('Nie można wczytać pliku GeoJSON');
    return r.json();
  })
  .then(data => {
    const layer = L.geoJSON(data, {

      // Style lines
      style(feature) {
        if (feature.geometry.type !== 'LineString' &&
            feature.geometry.type !== 'MultiLineString') return {};
        return {
          color: getLineColor(feature.properties),
          weight: 3.5,
          opacity: 0.95,
          lineJoin: 'round',
          lineCap: 'round',
        };
      },

      // Style points
      pointToLayer(feature, latlng) {
        const p = feature.properties || {};
        let type = 'stop';
        if (p.railway === 'station') {
          type = p.interchange === 'yes' || p.station === 'main'
            ? 'interchange' : 'main';
        }
        const marker = stationIcon(type);
        marker.setLatLng(latlng);
        return marker;
      },

      // Interactions
      onEachFeature(feature, layer) {
        const p = feature.properties || {};
        if (!p.name) return;

        // Tooltip (always visible label for stations)
        if (p.railway === 'station' || p.railway === 'halt') {
          layer.bindTooltip(p.name, {
            permanent: true,
            direction: 'right',
            offset: [8, 0],
            className: '',
          });
        }

        // Click → info panel
        layer.on('click', () => showInfo(p));

        // Hover highlight for lines
        if (feature.geometry.type === 'LineString' ||
            feature.geometry.type === 'MultiLineString') {
          layer.on('mouseover', () => layer.setStyle({ weight: 6, opacity: 1 }));
          layer.on('mouseout',  () => layer.setStyle({ weight: 3.5, opacity: 0.95 }));
        }
      }
    }).addTo(map);

    // Fit map to data
    if (layer.getBounds().isValid()) {
      map.fitBounds(layer.getBounds(), { padding: [40, 40] });
    }
  })
  .catch(err => {
    console.error(err);
    // Friendly fallback message on map
    document.getElementById('map').innerHTML += `
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
        text-align:center;color:#555;font-family:'Barlow',sans-serif;">
        <div style="font-size:48px;margin-bottom:12px">🗺️</div>
        <div style="font-size:18px;font-weight:600">Nie znaleziono pliku railway.geojson</div>
        <div style="font-size:13px;margin-top:6px;color:#999">
          Umieść plik GeoJSON wyeksportowany z JOSM obok tego pliku HTML<br>
          i nazwij go <code>railway.geojson</code>
        </div>
      </div>`;
  });
</script>
</body>
</html>
