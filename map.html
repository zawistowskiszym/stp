<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Koleje Królewskie — Mapa Sieci</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e1117;
      --surface:   #161b27;
      --surface2:  #1e2535;
      --border:    #2a3347;
      --border2:   #3a4560;
      --amber:     #e8a945;
      --amber-dim: #a87830;
      --red:       #d94f3d;
      --green:     #3daa6e;
      --blue:      #4a8fd4;
      --text:      #e8e4da;
      --text-dim:  #8896aa;
      --text-faint:#4a5568;
    }

    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    /* ── Subtle grid texture on body ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.18;
    }

    /* ── Header ── */
    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      height: 60px;
      display: flex; align-items: center; gap: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 30px #00000060;
    }

    .header-accent {
      width: 4px; height: 100%;
      background: linear-gradient(180deg, var(--amber) 0%, var(--amber-dim) 100%);
      flex-shrink: 0;
    }

    .header-inner {
      display: flex; align-items: center; gap: 20px;
      padding: 0 24px; flex: 1;
    }

    .logo-mark {
      width: 32px; height: 32px;
      background: var(--amber);
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      color: var(--text);
      letter-spacing: 0.5px;
      line-height: 1;
    }

    .logo-text small {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 2px;
      font-weight: 400;
    }

    .header-divider {
      width: 1px; height: 28px;
      background: var(--border2);
    }

    .header-meta {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .header-status {
      margin-left: auto;
      display: flex; align-items: center; gap: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--green);
      letter-spacing: 1px;
    }

    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Map ── */
    #map {
      position: fixed; top: 60px; bottom: 0; left: 0; right: 0;
      background: var(--bg);
      z-index: 1;
    }

    /* ── Panels shared ── */
    .panel {
      position: absolute;
      z-index: 900;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      box-shadow: 0 8px 40px #00000080, inset 0 1px 0 #ffffff08;
      overflow: hidden;
    }

    .panel-header {
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    .panel-title {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--amber);
      display: flex; align-items: center; gap: 8px;
    }

    .panel-title::before {
      content: '';
      width: 3px; height: 12px;
      background: var(--amber);
      border-radius: 1px;
      flex-shrink: 0;
    }

    .panel-body { padding: 16px 18px; }

    /* ── Planner panel ── */
    #planner { top: 80px; left: 20px; width: 270px; }

    .field-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 6px;
      display: flex; align-items: center; gap: 6px;
    }

    .field-label .dot {
      width: 6px; height: 6px; border-radius: 50%;
      flex-shrink: 0;
    }

    .field-label .dot.origin { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .field-label .dot.dest   { background: var(--red);   box-shadow: 0 0 6px var(--red); }

    .station-btn {
      width: 100%; padding: 10px 12px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 2px; text-align: left;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; color: var(--text-dim);
      cursor: pointer; transition: all 0.2s;
      letter-spacing: 0.2px;
    }

    .station-btn:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }
    .station-btn.selecting { border-color: var(--amber); color: var(--amber); background: #e8a94508; animation: blink-border 1s infinite; }
    .station-btn.origin.set { border-color: var(--green); color: var(--green); background: #3daa6e08; font-weight: 500; }
    .station-btn.destination.set { border-color: var(--red); color: var(--red); background: #d94f3d08; font-weight: 500; }

    @keyframes blink-border {
      0%, 100% { border-color: var(--amber); }
      50% { border-color: var(--amber-dim); }
    }

    .field-group { margin-bottom: 12px; }

    .connector-line {
      width: 1px; height: 10px;
      background: var(--border2);
      margin: 3px 0 3px 18px;
    }

    #find-btn {
      width: 100%; padding: 11px;
      background: var(--amber);
      color: #0e1117;
      border: none; border-radius: 2px;
      font-family: 'DM Mono', monospace;
      font-size: 11px; letter-spacing: 2.5px;
      text-transform: uppercase;
      font-weight: 500;
      cursor: pointer; transition: all 0.2s;
      margin-top: 4px;
    }

    #find-btn:hover { background: #f0b955; transform: translateY(-1px); box-shadow: 0 4px 20px #e8a94540; }
    #find-btn:active { transform: translateY(0); }
    #find-btn:disabled { background: var(--surface2); color: var(--text-faint); cursor: not-allowed; transform: none; box-shadow: none; }

    #clear-btn {
      width: 100%; padding: 8px;
      background: transparent; color: var(--text-faint);
      border: 1px solid var(--border); border-radius: 2px;
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 1.5px; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s; margin-top: 8px;
    }

    #clear-btn:hover { border-color: var(--red); color: var(--red); }

    /* ── Results panel ── */
    #results {
      bottom: 20px; left: 20px; width: 270px;
      display: none;
      max-height: calc(100vh - 200px);
      overflow-y: auto;
    }

    #results::-webkit-scrollbar { width: 3px; }
    #results::-webkit-scrollbar-track { background: transparent; }
    #results::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .result-summary {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 8px; margin-bottom: 16px;
    }

    .result-stat {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 2px; padding: 10px 8px; text-align: center;
    }

    .result-stat .val {
      font-family: 'Playfair Display', serif;
      font-size: 17px; color: var(--amber);
      line-height: 1; margin-bottom: 4px;
    }

    .result-stat .lbl {
      font-family: 'DM Mono', monospace;
      font-size: 8px; text-transform: uppercase;
      letter-spacing: 1.5px; color: var(--text-faint);
    }

    .stop-list { list-style: none; }

    .stop-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .stop-item:last-child { border-bottom: none; }

    .stop-track {
      display: flex; flex-direction: column;
      align-items: center; flex-shrink: 0;
      padding-top: 3px;
    }

    .stop-dot {
      width: 10px; height: 10px; border-radius: 50%;
      border: 2px solid var(--border2);
      background: var(--surface); flex-shrink: 0;
      transition: all 0.2s;
    }

    .stop-dot.origin   { background: var(--green); border-color: var(--green); box-shadow: 0 0 8px #3daa6e60; }
    .stop-dot.destination { background: var(--red); border-color: var(--red); box-shadow: 0 0 8px #d94f3d60; }

    .stop-line-seg {
      width: 2px; flex: 1; min-height: 10px;
      background: var(--border); margin-top: 3px;
    }

    .stop-info { flex: 1; min-width: 0; }
    .stop-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .stop-time { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-faint); margin-top: 2px; }

    .no-route {
      font-family: 'DM Mono', monospace;
      font-size: 11px; color: var(--red);
      text-align: center; padding: 16px 0;
      letter-spacing: 0.5px; line-height: 1.6;
    }

    /* ── Scale pill ── */
    #scale-info {
      position: absolute; bottom: 20px; right: 20px; z-index: 900;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 2px; padding: 7px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 10px; color: var(--text-faint);
      letter-spacing: 1px;
    }

    #scale-info span { color: var(--amber); }

    /* ── Selecting hint ── */
    #select-hint {
      position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
      z-index: 950; pointer-events: none;
      background: var(--amber); color: #0e1117;
      font-family: 'DM Mono', monospace; font-size: 11px;
      letter-spacing: 2px; text-transform: uppercase;
      padding: 8px 20px; border-radius: 2px;
      box-shadow: 0 4px 20px #e8a94550;
      display: none;
      animation: float 2s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-4px); }
    }

    /* ── Leaflet overrides ── */
    .leaflet-container {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg) !important;
    }

    .leaflet-control-zoom {
      border: 1px solid var(--border) !important;
      border-radius: 2px !important;
      overflow: hidden;
      box-shadow: 0 4px 20px #00000060 !important;
    }

    .leaflet-control-zoom a {
      background: var(--surface) !important;
      color: var(--text-dim) !important;
      border-bottom: 1px solid var(--border) !important;
      font-family: 'DM Sans', sans-serif !important;
      font-size: 16px !important;
      width: 32px !important; height: 32px !important;
      line-height: 32px !important;
      transition: all 0.15s;
    }

    .leaflet-control-zoom a:last-child { border-bottom: none !important; }
    .leaflet-control-zoom a:hover { background: var(--surface2) !important; color: var(--amber) !important; }

    .leaflet-tooltip {
      font-family: 'DM Mono', monospace !important;
      font-size: 10px !important;
      font-weight: 500 !important;
      letter-spacing: 0.5px;
      color: var(--text) !important;
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: 2px !important;
      padding: 3px 7px !important;
      box-shadow: 0 2px 10px #00000060 !important;
      white-space: nowrap;
    }

    .leaflet-tooltip::before { display: none; }

    #map.selecting-station { cursor: crosshair !important; }

    /* Panel slide-in animation */
    .panel { animation: slideIn 0.3s ease; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #results.show { display: block; animation: slideIn 0.3s ease; }
  </style>
</head>
<body>

<div id="header">
  <div class="header-accent"></div>
  <div class="header-inner">
    <div class="logo-mark"></div>
    <div class="logo-text">
      Koleje Królewskie
      <small>Sieć Krajowa · KDP 2025</small>
    </div>
    <div class="header-divider"></div>
    <div class="header-meta">Mapa Sieci · Planer Tras</div>
    <div class="header-status">
      <div class="status-dot"></div>
      System aktywny
    </div>
  </div>
</div>

<div id="map"></div>

<div id="select-hint">Wybierz stację na mapie</div>

<!-- Planner -->
<div class="panel" id="planner">
  <div class="panel-header">
    <div class="panel-title">Planer Trasy</div>
  </div>
  <div class="panel-body">
    <div class="field-group">
      <div class="field-label"><div class="dot origin"></div>Stacja początkowa</div>
      <button class="station-btn origin" id="btn-origin" onclick="startSelecting('origin')">Kliknij stację na mapie…</button>
    </div>
    <div class="connector-line"></div>
    <div class="field-group">
      <div class="field-label"><div class="dot dest"></div>Stacja docelowa</div>
      <button class="station-btn destination" id="btn-dest" onclick="startSelecting('destination')">Kliknij stację na mapie…</button>
    </div>
    <button id="find-btn" onclick="findRoute()" disabled>Znajdź trasę</button>
    <button id="clear-btn" onclick="clearRoute()">Wyczyść</button>
  </div>
</div>

<!-- Results -->
<div class="panel" id="results">
  <div class="panel-header">
    <div class="panel-title">Wynik trasy</div>
  </div>
  <div class="panel-body">
    <div id="results-content"></div>
  </div>
</div>

<div id="scale-info">1 jedn. ≈ <span id="scale-val">…</span> km</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const GEOJSON_PATH = 'railway.geojson';
const LINE_COLORS = {
  red:'#d94f3d', blue:'#4a8fd4', purple:'#9b72cf',
  yellow:'#e8a945', green:'#3daa6e', orange:'#e8783d',
  brown:'#a07850', cyan:'#3daabb', default:'#5a6a80'
};
const DWELL_MAIN = 3, DWELL_HALT = 1, TARGET_WIDTH_KM = 500, SNAP = 0.005;

// ── MAP ───────────────────────────────────────────────────────────────────────
const map = L.map('map', { crs: L.CRS.Simple, minZoom: -3, maxZoom: 20 });

// ── STATE ─────────────────────────────────────────────────────────────────────
let stations=[], graph={}, routeLayer=null, origin=null, dest=null, selecting=null, scale=null;

// ── HELPERS ───────────────────────────────────────────────────────────────────
function lineRef(p) { if(!p) return 'default'; return p.colour||'default'; }
function cdist(a,b) { const dx=a[0]-b[0],dy=a[1]-b[1]; return Math.sqrt(dx*dx+dy*dy); }
function fmt(m) {
  if(m<60) return Math.round(m)+' min';
  const h=Math.floor(m/60),mn=Math.round(m%60);
  return mn>0 ? h+'h '+mn+'min' : h+'h';
}
function p2seg(p,a,b) {
  const dx=b[0]-a[0],dy=b[1]-a[1];
  if(!dx&&!dy) return cdist(p,a);
  const t=Math.max(0,Math.min(1,((p[0]-a[0])*dx+(p[1]-a[1])*dy)/(dx*dx+dy*dy)));
  return cdist(p,[a[0]+t*dx,a[1]+t*dy]);
}
function autoScale(d) {
  let mn=Infinity,mx=-Infinity;
  function w(c){if(typeof c[0]==='number'){if(c[0]<mn)mn=c[0];if(c[0]>mx)mx=c[0]}else c.forEach(w)}
  d.features.forEach(f=>{if(f.geometry)w(f.geometry.coordinates)});
  const s=mx-mn; return s>0?TARGET_WIDTH_KM/s:10;
}

// ── GRAPH ─────────────────────────────────────────────────────────────────────
function buildGraph(d) {
  const lines=d.features.filter(f=>f.geometry&&(f.geometry.type==='LineString'||f.geometry.type==='MultiLineString'));
  const pts=d.features.filter(f=>f.geometry&&f.geometry.type==='Point'&&f.properties&&(f.properties.railway==='station'||f.properties.railway==='halt'));
  pts.forEach((f,i)=>{
    const[lng,lat]=f.geometry.coordinates,id=f.properties.name||'st_'+i;
    stations.push({id,name:f.properties.name||id,latlng:[lat,lng],props:f.properties});graph[id]=[];
  });

  lines.forEach(line=>{
    let coords=line.geometry.type==='LineString'
      ? line.geometry.coordinates
      : line.geometry.coordinates.flat();
    const ms=line.properties?.maxspeed||null, col=lineRef(line.properties);

    // For each station, compute its position along this line as a single scalar "t"
    // t = segIndex + fraction_along_that_segment  (ranges 0 → coords.length-1)
    const snapped=[];
    stations.forEach(st=>{
      const[slat,slng]=st.latlng;
      let bestDist=Infinity, bestSeg=-1, bestT=0, bestProj=null;
      for(let i=0;i<coords.length-1;i++){
        const a=coords[i], b=coords[i+1];
        const dx=b[0]-a[0], dy=b[1]-a[1];
        const len2=dx*dx+dy*dy;
        const t=len2>0?Math.max(0,Math.min(1,((slng-a[0])*dx+(slat-a[1])*dy)/len2)):0;
        const px=a[0]+t*dx, py=a[1]+t*dy;
        const dist=Math.sqrt((slng-px)**2+(slat-py)**2);
        if(dist<bestDist){bestDist=dist;bestSeg=i;bestT=t;bestProj=[px,py];}
      }
      if(bestDist<SNAP) snapped.push({st, seg:bestSeg, t:bestSeg+bestT, proj:bestProj});
    });

    // Sort strictly by position along the line
    snapped.sort((a,b)=>a.t-b.t);

    // For each consecutive pair, extract the exact geometry slice
    for(let i=0;i<snapped.length-1;i++){
      const A=snapped[i], B=snapped[i+1];

      // Build coordinate array: A.proj → nodes between A and B → B.proj
      const geomFwd=[ A.proj ];
      // Add all coord nodes that lie strictly between A and B along the line
      for(let k=A.seg+1; k<=B.seg; k++){
        geomFwd.push(coords[k]);
      }
      geomFwd.push(B.proj);

      // Remove duplicate adjacent points
      const clean=geomFwd.filter((c,k)=>k===0||cdist(c,geomFwd[k-1])>1e-12);

      let dist=0;
      for(let k=0;k<clean.length-1;k++) dist+=cdist(clean[k],clean[k+1]);

      // Convert [lng,lat] → Leaflet [lat,lng]
      const fwd=clean.map(c=>[c[1],c[0]]);
      const rev=[...fwd].reverse();

      graph[A.st.id].push({to:B.st.id, dist, maxspeed:ms, colour:col, geom:fwd});
      graph[B.st.id].push({to:A.st.id, dist, maxspeed:ms, colour:col, geom:rev});
    }
  });
}

// ── DIJKSTRA ──────────────────────────────────────────────────────────────────
function dijkstra(s,e) {
  const dist={},prev={},pline={},vis=new Set();
  Object.keys(graph).forEach(id=>dist[id]=Infinity);dist[s]=0;
  const pq=[[0,s]];
  while(pq.length){
    pq.sort((a,b)=>a[0]-b[0]);const[d,u]=pq.shift();
    if(vis.has(u))continue;vis.add(u);if(u===e)break;
    for(const edge of(graph[u]||[])){
      const spd=parseFloat(edge.maxspeed)||160,tm=(edge.dist*scale/spd)*60;
      const dw=stations.find(x=>x.id===edge.to)?.props?.railway==='halt'?DWELL_HALT:DWELL_MAIN;
      const c=d+tm+dw;
      if(c<dist[edge.to]){dist[edge.to]=c;prev[edge.to]=u;pline[edge.to]=edge.colour;pq.push([c,edge.to])}
    }
  }
  if(dist[e]===Infinity)return null;
  const path=[];let cur=e;while(cur){path.unshift({id:cur,ref:pline[cur]||null});cur=prev[cur]}
  return{path,total:dist[e]};
}

// ── SELECTION ─────────────────────────────────────────────────────────────────
function startSelecting(mode) {
  selecting=mode;
  map.getContainer().classList.add('selecting-station');
  document.getElementById(mode==='origin'?'btn-origin':'btn-dest').classList.add('selecting');
  const hint=document.getElementById('select-hint');
  hint.style.display='block';
}

function onStationClick(st) {
  if(!selecting)return;
  map.getContainer().classList.remove('selecting-station');
  document.getElementById('select-hint').style.display='none';
  if(selecting==='origin'){
    origin=st;const b=document.getElementById('btn-origin');
    b.textContent=st.name;b.classList.remove('selecting');b.classList.add('set');
  } else {
    dest=st;const b=document.getElementById('btn-dest');
    b.textContent=st.name;b.classList.remove('selecting');b.classList.add('set');
  }
  selecting=null;
  document.getElementById('find-btn').disabled=!(origin&&dest);
  highlight();
}

function highlight() {
  stations.forEach(st=>{
    if(!st.marker)return;
    if(st===origin) st.marker.setStyle({fillColor:'#3daa6e',color:'#3daa6e',fillOpacity:1});
    else if(st===dest) st.marker.setStyle({fillColor:'#d94f3d',color:'#d94f3d',fillOpacity:1});
    else st.marker.setStyle({fillColor:'#e8e4da',color:'#e8e4da',fillOpacity:0.9});
  });
}

// ── ROUTE ─────────────────────────────────────────────────────────────────────
function findRoute() {
  if(!origin||!dest)return;
  if(routeLayer){map.removeLayer(routeLayer);routeLayer=null}
  const res=dijkstra(origin.id,dest.id);
  const rd=document.getElementById('results'),rc=document.getElementById('results-content');
  if(!res){
    rc.innerHTML='<div class="no-route">BRAK TRASY<br><span style="font-size:9px;color:#4a5568">Sprawdź tagi stacji w JOSM<br>lub zwiększ SNAP w pliku HTML</span></div>';
    rd.classList.add('show');return;
  }
  const{path,total}=res;
  // Animated route line
  // Stitch actual rail geometry for each edge in the path
  const routeLatLngs=[];
  for(let i=0;i<path.length-1;i++){
    const edge=graph[path[i].id]?.find(e=>e.to===path[i+1].id);
    if(edge?.geom) routeLatLngs.push(...edge.geom);
    else{const st=stations.find(s=>s.id===path[i].id);if(st)routeLatLngs.push(st.latlng);}
  }
  // Add final destination
  const lastSt=stations.find(s=>s.id===path[path.length-1].id);
  if(lastSt)routeLatLngs.push(lastSt.latlng);
  routeLayer=L.polyline(routeLatLngs,
    {color:'#e8a945',weight:5,opacity:.95,lineJoin:'round',lineCap:'round'}
  ).addTo(map);
  map.fitBounds(routeLayer.getBounds(),{padding:[80,80]});

  let elapsed=0,totalKm=0;
  const items=path.map((p,i)=>{
    const st=stations.find(s=>s.id===p.id),isF=i===0,isL=i===path.length-1;
    if(!isF){const pr=path[i-1],edge=graph[pr.id]?.find(e=>e.to===p.id);if(edge)elapsed+=(edge.dist*scale/(parseFloat(edge.maxspeed)||160))*60;}
    const dw=st?.props?.railway==='halt'?DWELL_HALT:DWELL_MAIN;
    const h=Math.floor(elapsed/60),m=Math.round(elapsed%60);
    const ts=isF?'Odjazd':'+'+fmt(elapsed);
    const trackSeg=!isL?'<div class="stop-line-seg"></div>':'';
    return`<li class="stop-item">
      <div class="stop-track">
        <div class="stop-dot${isF?' origin':isL?' destination':''}"></div>
        ${trackSeg}
      </div>
      <div class="stop-info">
        <div class="stop-name">${st?.name||p.id}</div>
        <div class="stop-time">${ts}${!isL?' · '+dw+' min postoju':''}</div>
      </div>
    </li>`;
  }).join('');
  for(let i=0;i<path.length-1;i++){const e=graph[path[i].id]?.find(x=>x.to===path[i+1].id);if(e)totalKm+=e.dist*scale}
  rc.innerHTML=`
    <div class="result-summary">
      <div class="result-stat"><div class="val">${fmt(total)}</div><div class="lbl">Czas</div></div>
      <div class="result-stat"><div class="val">${Math.round(totalKm)}</div><div class="lbl">km</div></div>
      <div class="result-stat"><div class="val">${path.length}</div><div class="lbl">Stacji</div></div>
    </div>
    <ul class="stop-list">${items}</ul>`;
  rd.classList.add('show');
}

function clearRoute() {
  origin=null;dest=null;selecting=null;
  if(routeLayer){map.removeLayer(routeLayer);routeLayer=null}
  document.getElementById('btn-origin').textContent='Kliknij stację na mapie…';
  document.getElementById('btn-dest').textContent='Kliknij stację na mapie…';
  ['btn-origin','btn-dest'].forEach(id=>document.getElementById(id).classList.remove('set','selecting'));
  document.getElementById('find-btn').disabled=true;
  document.getElementById('results').classList.remove('show');
  document.getElementById('select-hint').style.display='none';
  highlight();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
fetch(GEOJSON_PATH)
  .then(r=>{if(!r.ok)throw new Error();return r.json()})
  .then(data=>{
    scale=autoScale(data);
    document.getElementById('scale-val').textContent=scale.toFixed(1);
    buildGraph(data);

    L.geoJSON(data,{
      style(f){
        if(!f.geometry)return{};
        const t=f.geometry.type;
        if(t!=='LineString'&&t!=='MultiLineString')return{};
        return{color:LINE_COLORS[lineRef(f.properties)]||LINE_COLORS.default,weight:3,opacity:.9,lineJoin:'round',lineCap:'round'};
      },
      pointToLayer(f,ll){
        const p=f.properties||{};
        if(p.railway!=='station'&&p.railway!=='halt')return null;
        const big=p.interchange==='yes'||p.station==='main';
        return L.circleMarker(ll,{
          radius:big?8:p.railway==='halt'?3:5,
          color:'#e8e4da',weight:big?2.5:1.5,
          fillColor:'#e8e4da',fillOpacity:0.9,
        });
      },
      onEachFeature(f,layer){
        const p=f.properties||{};
        if(p.railway==='station'||p.railway==='halt'){
          if(p.name) layer.bindTooltip(p.name,{permanent:false,direction:'right',offset:[10,0]});
          const st=stations.find(s=>s.id===(p.name||''));if(st)st.marker=layer;
          layer.on('click',()=>{if(selecting&&st)onStationClick(st)});
          layer.on('mouseover',function(){if(selecting)this.setStyle({fillColor:'#e8a945',color:'#e8a945'})});
          layer.on('mouseout',function(){if(st!==origin&&st!==dest)this.setStyle({fillColor:'#e8e4da',color:'#e8e4da'})});
        }
        const t=f.geometry?.type;
        if(t==='LineString'||t==='MultiLineString'){
          layer.on('mouseover',()=>layer.setStyle({weight:5,opacity:1}));
          layer.on('mouseout', ()=>layer.setStyle({weight:3,opacity:.9}));
        }
      }
    }).addTo(map);

    const b=L.geoJSON(data).getBounds();
    if(b.isValid())map.fitBounds(b,{padding:[60,60]});
  })
  .catch(()=>{
    document.getElementById('map').innerHTML+=`
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#5a6a80;font-family:'DM Mono',monospace">
        <div style="font-size:40px;margin-bottom:16px;opacity:.4">◈</div>
        <div style="font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#e8a945">Brak danych</div>
        <div style="font-size:11px;margin-top:8px;letter-spacing:1px;line-height:1.8">
          Umieść plik <span style="color:#e8e4da">railway.geojson</span><br>
          w tym samym katalogu co ten plik HTML
        </div>
      </div>`;
  });
</script>
