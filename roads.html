<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sieć Drogowa — Skuszawyjice</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&family=Noto+Serif:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* OSM-inspired light palette */
      --map-bg:       #f2efe9;
      --road-motor:   #e892a2;  /* motorway — pink/red */
      --road-express: #f9b29c;  /* expressway — salmon */
      --road-national:#fcd6a4;  /* national — yellow */
      --road-regional:#f0e68c;  /* regional — light yellow */
      --road-local:   #ffffff;  /* local — white */
      --road-ped:     #ededed;  /* pedestrian — light grey */
      --border-motor:   #e8615b;
      --border-express: #e08060;
      --border-nat:     #d4a853;
      --border-reg:     #bab060;
      --border-local:   #c8c8c8;
      --border-ped:     #b8b8b8;
      --district-fill:  rgba(180,210,180,0.15);
      --district-stroke:#7aaa7a;
      --text-dark:    #333;
      --text-mid:     #666;
      --text-light:   #999;
      --panel-bg:     #ffffff;
      --panel-border: #ddd;
      --header-bg:    #405d7a;
      --header-text:  #ffffff;
      --accent:       #e8615b;
      --shadow:       0 2px 12px rgba(0,0,0,.15);
    }

    html, body { height:100%; font-family:'Noto Sans',sans-serif; background:var(--map-bg); overflow:hidden; }

    /* ── Header ── */
    #header {
      position:fixed; top:0; left:0; right:0; z-index:1000;
      height:52px; background:var(--header-bg);
      display:flex; align-items:center; gap:16px; padding:0 20px;
      box-shadow:0 2px 8px rgba(0,0,0,.3);
    }
    .header-logo {
      font-family:'Noto Serif',serif; font-size:18px; font-weight:700;
      color:#fff; letter-spacing:.3px;
    }
    .header-logo span { color:#f9b29c; }
    .header-sub {
      font-size:11px; color:rgba(255,255,255,.6); letter-spacing:1px;
      text-transform:uppercase; border-left:1px solid rgba(255,255,255,.2);
      padding-left:16px;
    }
    .header-chip {
      margin-left:auto; font-size:10px; background:rgba(255,255,255,.15);
      color:#fff; padding:3px 10px; border-radius:12px; letter-spacing:.5px;
    }

    /* ── Map ── */
    #map {
      position:fixed; top:52px; bottom:0; left:0; right:0;
      background:var(--map-bg);
    }

    /* ── Legend ── */
    #legend {
      position:absolute; bottom:24px; left:16px; z-index:900;
      background:var(--panel-bg); border:1px solid var(--panel-border);
      border-radius:6px; padding:14px 16px; min-width:210px;
      box-shadow:var(--shadow); font-size:12px;
    }
    #legend h4 {
      font-size:10px; letter-spacing:2px; text-transform:uppercase;
      color:var(--text-mid); margin-bottom:10px; font-weight:600;
    }
    .leg-item { display:flex; align-items:center; gap:10px; margin-bottom:7px; }
    .leg-item:last-child { margin-bottom:0; }
    .leg-road {
      width:36px; height:6px; border-radius:3px; flex-shrink:0;
      border-bottom:2px solid transparent;
    }
    .leg-motor   { background:var(--road-motor);   border-color:var(--border-motor); }
    .leg-express { background:var(--road-express);  border-color:var(--border-express); }
    .leg-nat     { background:var(--road-national); border-color:var(--border-nat); }
    .leg-reg     { background:var(--road-regional); border-color:var(--border-reg); }
    .leg-local   { background:var(--road-local);    border-color:var(--border-local); }
    .leg-ped     { background:var(--road-ped);       border-color:var(--border-ped); border-style:dashed; }
    .leg-district { width:16px; height:16px; border-radius:3px;
      background:var(--district-fill); border:2px solid var(--district-stroke); flex-shrink:0; }
    .leg-label { color:var(--text-dark); font-size:11px; }

    /* ── Road number shields ── */
    .shield {
      display:inline-flex; align-items:center; justify-content:center;
      font-weight:700; font-size:9px; min-width:22px; height:16px;
      padding:0 4px; border-radius:2px; color:#fff; flex-shrink:0;
    }
    .shield.A  { background:#e8615b; }
    .shield.S  { background:#e08060; }
    .shield.DK { background:#d4a853; color:#333; }
    .shield.DW { background:#9aaa40; }

    /* ── Info panel ── */
    #info-panel {
      position:absolute; top:16px; right:16px; z-index:900;
      background:var(--panel-bg); border:1px solid var(--panel-border);
      border-radius:6px; width:280px; box-shadow:var(--shadow);
      display:none; overflow:hidden;
    }
    #info-panel.visible { display:block; animation:slideIn .2s ease; }
    @keyframes slideIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    #info-header {
      padding:12px 16px; display:flex; align-items:flex-start;
      justify-content:space-between;
    }
    #info-type-badge {
      font-size:9px; letter-spacing:1.5px; text-transform:uppercase;
      padding:2px 8px; border-radius:10px; font-weight:600; color:#fff;
      margin-bottom:4px; display:inline-block;
    }
    #info-name { font-size:16px; font-weight:700; color:var(--text-dark); line-height:1.2; }
    #info-close {
      background:none; border:none; color:var(--text-light);
      font-size:18px; cursor:pointer; padding:0 0 0 8px; line-height:1;
      flex-shrink:0;
    }
    #info-close:hover { color:var(--accent); }
    #info-body { padding:0 16px 14px; }
    .info-row {
      display:flex; justify-content:space-between; align-items:center;
      padding:5px 0; border-bottom:1px solid #f0f0f0; font-size:12px;
    }
    .info-row:last-child { border-bottom:none; }
    .info-key { color:var(--text-mid); }
    .info-val { color:var(--text-dark); font-weight:500; text-align:right; }

    /* ── District tooltip ── */
    .district-label {
      font-family:'Noto Sans',sans-serif; font-size:11px; font-weight:600;
      color:#446644; background:rgba(255,255,255,.85); border:1px solid #aacaaa;
      padding:2px 8px; border-radius:3px; letter-spacing:.5px;
      text-transform:uppercase;
    }

    /* ── Leaflet overrides ── */
    .leaflet-container { font-family:'Noto Sans',sans-serif; background:var(--map-bg) !important; }
    .leaflet-control-zoom {
      border:1px solid var(--panel-border) !important;
      border-radius:6px !important; overflow:hidden;
      box-shadow:var(--shadow) !important;
    }
    .leaflet-control-zoom a {
      background:var(--panel-bg) !important; color:var(--text-dark) !important;
      border-bottom:1px solid var(--panel-border) !important;
      width:30px !important; height:30px !important; line-height:30px !important;
      font-size:16px !important;
    }
    .leaflet-control-zoom a:last-child { border-bottom:none !important; }
    .leaflet-control-zoom a:hover { background:#f5f5f5 !important; }

    .leaflet-tooltip {
      font-family:'Noto Sans',sans-serif; font-size:12px; font-weight:500;
      background:rgba(255,255,255,.95); border:1px solid #ccc;
      border-radius:4px; padding:4px 8px; box-shadow:0 2px 6px rgba(0,0,0,.1);
      color:var(--text-dark);
    }

    /* ── Scale bar position ── */
    .leaflet-control-scale { bottom:60px !important; }

    /* ── Route planner ── */
    #planner {
      position:absolute; top:16px; left:16px; z-index:900;
      background:var(--panel-bg); border:1px solid var(--panel-border);
      border-radius:6px; width:260px; box-shadow:var(--shadow);
      overflow:hidden;
    }
    #planner-header {
      padding:10px 14px; background:#f7f7f7; border-bottom:1px solid var(--panel-border);
      display:flex; align-items:center; justify-content:space-between;
    }
    #planner-header h3 {
      font-size:11px; letter-spacing:1.5px; text-transform:uppercase;
      color:var(--text-mid); font-weight:600;
    }
    .planner-body { padding:12px 14px; }
    .planner-field { margin-bottom:10px; }
    .planner-field label {
      font-size:10px; letter-spacing:1px; text-transform:uppercase;
      color:var(--text-light); display:block; margin-bottom:4px;
    }
    .planner-input-wrap {
      display:flex; gap:6px; align-items:center;
    }
    .planner-input {
      flex:1; padding:7px 10px; border:1px solid var(--panel-border);
      border-radius:4px; font-size:12px; font-family:'Noto Sans',sans-serif;
      color:var(--text-dark); outline:none; transition:border-color .15s;
      background:#fafafa;
    }
    .planner-input:focus { border-color:#405d7a; background:#fff; }
    .planner-input.set { border-color:#405d7a; background:#fff; font-weight:500; }
    .planner-input.origin.set { border-color:#2e7d32; color:#2e7d32; }
    .planner-input.dest.set   { border-color:#c62828; color:#c62828; }
    .pick-btn {
      width:30px; height:30px; border-radius:4px; border:1px solid var(--panel-border);
      background:#fafafa; cursor:pointer; font-size:13px; transition:all .15s;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .pick-btn:hover { border-color:#405d7a; background:#405d7a; color:#fff; }
    .pick-btn.selecting { border-color:#405d7a; background:#405d7a; color:#fff;
      animation:pulse-pick .8s infinite; }
    @keyframes pulse-pick { 0%,100%{opacity:1} 50%{opacity:.6} }
    #route-btn {
      width:100%; padding:9px; background:#405d7a; color:#fff; border:none;
      border-radius:4px; font-family:'Noto Sans',sans-serif; font-size:13px;
      font-weight:600; cursor:pointer; transition:background .15s; margin-top:4px;
    }
    #route-btn:hover { background:#2c4a63; }
    #route-btn:disabled { background:#ccc; cursor:not-allowed; }
    #clear-btn {
      width:100%; padding:6px; background:transparent; color:var(--text-light);
      border:1px solid var(--panel-border); border-radius:4px;
      font-family:'Noto Sans',sans-serif; font-size:11px;
      cursor:pointer; transition:all .15s; margin-top:6px;
    }
    #clear-btn:hover { border-color:#c62828; color:#c62828; }

    /* Route results */
    #route-results {
      border-top:1px solid var(--panel-border); padding:12px 14px;
      display:none;
    }
    .route-summary {
      display:flex; gap:8px; margin-bottom:10px;
    }
    .route-stat {
      flex:1; background:#f7f7f7; border-radius:4px; padding:8px;
      text-align:center; border:1px solid var(--panel-border);
    }
    .route-stat .rs-val {
      font-size:16px; font-weight:700; color:#405d7a; line-height:1;
    }
    .route-stat .rs-lbl {
      font-size:9px; text-transform:uppercase; letter-spacing:1px;
      color:var(--text-light); margin-top:3px;
    }
    .turn-list { list-style:none; max-height:200px; overflow-y:auto; }
    .turn-list::-webkit-scrollbar { width:3px; }
    .turn-list::-webkit-scrollbar-thumb { background:#ddd; border-radius:2px; }
    .turn-item {
      display:flex; align-items:flex-start; gap:8px;
      padding:6px 0; border-bottom:1px solid #f5f5f5; font-size:11px;
    }
    .turn-item:last-child { border-bottom:none; }
    .turn-icon { width:20px; height:20px; border-radius:50%; background:#405d7a;
      color:#fff; font-size:10px; display:flex; align-items:center;
      justify-content:center; flex-shrink:0; margin-top:1px; }
    .turn-icon.dest { background:#c62828; }
    .turn-icon.start { background:#2e7d32; }
    .turn-street { font-weight:500; color:var(--text-dark); }
    .turn-dist { color:var(--text-light); font-size:10px; margin-top:1px; }

    /* Autocomplete dropdown */
    .autocomplete-drop {
      position:absolute; left:0; right:0; top:100%;
      background:#fff; border:1px solid var(--panel-border);
      border-top:none; border-radius:0 0 4px 4px;
      max-height:160px; overflow-y:auto; z-index:1000;
      box-shadow:0 4px 8px rgba(0,0,0,.1);
    }
    .ac-item { padding:7px 10px; font-size:12px; cursor:pointer;
      border-bottom:1px solid #f5f5f5; }
    .ac-item:last-child { border-bottom:none; }
    .ac-item:hover { background:#f0f5fa; }
    .ac-name { font-weight:500; color:var(--text-dark); }
    .ac-type { font-size:10px; color:var(--text-light); }

    /* Selecting cursor */
    #map.selecting { cursor:crosshair !important; }

    /* Hint banner */
    #pick-hint {
      position:absolute; top:80px; left:50%; transform:translateX(-50%);
      z-index:950; background:#405d7a; color:#fff;
      font-size:12px; font-weight:600; padding:7px 18px; border-radius:20px;
      box-shadow:0 3px 12px rgba(0,0,0,.2); display:none; pointer-events:none;
      animation:float 2s ease-in-out infinite;
    }
    @keyframes float {
      0%,100%{transform:translateX(-50%) translateY(0)}
      50%{transform:translateX(-50%) translateY(-4px)}
    }

    /* ── Search box ── */
    #search-box {
      position:absolute; top:16px; left:16px; z-index:900;
      background:var(--panel-bg); border:1px solid var(--panel-border);
      border-radius:6px; display:flex; align-items:center;
      box-shadow:var(--shadow); overflow:hidden; width:240px;
    }
    #search-input {
      border:none; outline:none; padding:9px 12px; font-size:13px;
      font-family:'Noto Sans',sans-serif; color:var(--text-dark);
      flex:1; background:transparent;
    }
    #search-input::placeholder { color:var(--text-light); }
    #search-icon { padding:0 12px; color:var(--text-light); font-size:14px; }
    #search-results {
      position:absolute; top:100%; left:0; right:0; background:var(--panel-bg);
      border:1px solid var(--panel-border); border-top:none; border-radius:0 0 6px 6px;
      max-height:200px; overflow-y:auto; display:none;
    }
    #search-results.visible { display:block; }
    .search-result {
      padding:8px 12px; font-size:12px; cursor:pointer;
      border-bottom:1px solid #f5f5f5; transition:background .1s;
    }
    .search-result:last-child { border-bottom:none; }
    .search-result:hover { background:#f9f9f9; }
    .search-result .sr-name { font-weight:600; color:var(--text-dark); }
    .search-result .sr-type { font-size:10px; color:var(--text-mid); margin-top:1px; }
  </style>
</head>
<body>

<div id="header">
  <div class="header-logo">Skuszawyjice <span>·</span> Sieć Drogowa</div>
  <div class="header-sub">Mapa infrastruktury drogowej</div>
  <div class="header-chip" id="road-count">Wczytywanie…</div>
</div>

<div id="map"></div>

<!-- Pick hint -->
<div id="pick-hint">Kliknij punkt na mapie</div>

<!-- Route planner -->
<div id="planner">
  <div id="planner-header">
    <h3>Wyznacz trasę</h3>
    <span id="route-mode-label" style="font-size:10px;color:#405d7a;font-weight:600">🚗 Samochód</span>
  </div>
  <div class="planner-body">
    <div class="planner-field">
      <label>📍 Start</label>
      <div class="planner-input-wrap" style="position:relative">
        <input class="planner-input origin" id="origin-input" placeholder="Wpisz ulicę lub kliknij na mapie…"
          oninput="onAutoComplete('origin', this.value)" autocomplete="off">
        <div class="autocomplete-drop" id="origin-ac" style="display:none"></div>
        <button class="pick-btn" id="pick-origin-btn" onclick="startPicking('origin')" title="Kliknij na mapie">📍</button>
      </div>
    </div>
    <div class="planner-field">
      <label>🏁 Cel</label>
      <div class="planner-input-wrap" style="position:relative">
        <input class="planner-input dest" id="dest-input" placeholder="Wpisz ulicę lub kliknij na mapie…"
          oninput="onAutoComplete('dest', this.value)" autocomplete="off">
        <div class="autocomplete-drop" id="dest-ac" style="display:none"></div>
        <button class="pick-btn" id="pick-dest-btn" onclick="startPicking('dest')" title="Kliknij na mapie">🏁</button>
      </div>
    </div>
    <button id="route-btn" onclick="findRoute()" disabled>Wyznacz trasę</button>
    <button id="clear-btn" onclick="clearRoute()">Wyczyść</button>
    <div id="route-results">
      <div class="route-summary" id="route-summary"></div>
      <ul class="turn-list" id="turn-list"></ul>
    </div>
  </div>
</div>

<!-- Info panel -->
<div id="info-panel">
  <div id="info-header">
    <div>
      <div id="info-type-badge"></div>
      <div id="info-name"></div>
    </div>
    <button id="info-close" onclick="closeInfo()">✕</button>
  </div>
  <div id="info-body" id="info-rows"></div>
</div>

<!-- Legend -->
<div id="legend">
  <h4>Legenda</h4>
  <div class="leg-item"><div class="leg-road leg-motor"></div><span class="shield A">A</span><span class="leg-label">Autostrada</span></div>
  <div class="leg-item"><div class="leg-road leg-express"></div><span class="shield S">S</span><span class="leg-label">Droga ekspresowa</span></div>
  <div class="leg-item"><div class="leg-road leg-nat"></div><span class="shield DK">DK</span><span class="leg-label">Droga krajowa</span></div>
  <div class="leg-item"><div class="leg-road leg-reg"></div><span class="shield DW">DW</span><span class="leg-label">Droga wojewódzka</span></div>
  <div class="leg-item"><div class="leg-road leg-local"></div><span class="leg-label" style="margin-left:22px">Ulica lokalna</span></div>
  <div class="leg-item"><div class="leg-road leg-ped"></div><span class="leg-label" style="margin-left:22px">Droga piesza</span></div>
  <div class="leg-item" style="margin-top:8px;padding-top:8px;border-top:1px solid #eee">
    <div class="leg-district"></div><span class="leg-label">Dzielnica</span>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
// Road data file — put your JOSM-exported GeoJSON here
const ROADS_GEOJSON   = 'roads.geojson';
// District boundaries file (optional — can be same file or separate)
const DISTRICT_GEOJSON = 'districts.geojson';

// ── ROAD STYLING ──────────────────────────────────────────────────────────────
// Match by highway= tag (OSM convention)
const ROAD_STYLES = {
  motorway:       { color:'#e8615b', weight:6, opacity:1, zIndex:60 },
  motorway_link:  { color:'#e8615b', weight:4, opacity:1, zIndex:59 },
  trunk:          { color:'#e08060', weight:5, opacity:1, zIndex:55 }, // expressway
  trunk_link:     { color:'#e08060', weight:3, opacity:1, zIndex:54 },
  primary:        { color:'#d4a853', weight:4, opacity:1, zIndex:50 }, // national
  primary_link:   { color:'#d4a853', weight:3, opacity:1, zIndex:49 },
  secondary:      { color:'#bab060', weight:3.5, opacity:1, zIndex:45 }, // regional
  secondary_link: { color:'#bab060', weight:2.5, opacity:1, zIndex:44 },
  tertiary:       { color:'#c8c8c8', weight:3, opacity:1, zIndex:40 },
  tertiary_link:  { color:'#c8c8c8', weight:2, opacity:1, zIndex:39 },
  residential:    { color:'#ffffff', weight:2.5, opacity:1, zIndex:35 },
  living_street:  { color:'#ededed', weight:2, opacity:1, zIndex:30 },
  pedestrian:     { color:'#ededed', weight:3, opacity:.9, zIndex:25, dashArray:'1 4' },
  footway:        { color:'#e0a0a0', weight:1.5, opacity:.8, zIndex:20, dashArray:'3 3' },
  path:           { color:'#d0a080', weight:1.5, opacity:.8, zIndex:19, dashArray:'3 3' },
  service:        { color:'#f0f0f0', weight:1.5, opacity:.9, zIndex:15 },
  unclassified:   { color:'#d8d8d8', weight:2, opacity:.9, zIndex:10 },
  _default:       { color:'#cccccc', weight:1.5, opacity:.8, zIndex:5 },
};

// Casing (border) colors — drawn as wider lines underneath
const CASING = {
  motorway:  '#b03040',
  trunk:     '#b06040',
  primary:   '#a07830',
  secondary: '#888040',
  tertiary:  '#aaaaaa',
  residential:'#bbbbbb',
};

const ROAD_TYPE_LABELS = {
  motorway:    'Autostrada',
  trunk:       'Droga ekspresowa',
  primary:     'Droga krajowa',
  secondary:   'Droga wojewódzka',
  tertiary:    'Droga powiatowa',
  residential: 'Ulica',
  living_street:'Strefa zamieszkania',
  pedestrian:  'Deptak / strefa piesza',
  footway:     'Chodnik / ścieżka',
  service:     'Droga dojazdowa',
  unclassified:'Droga nieskategoryzowana',
};

const ROAD_BADGE_COLORS = {
  motorway:    '#e8615b',
  trunk:       '#e08060',
  primary:     '#d4a853',
  secondary:   '#9aaa40',
  tertiary:    '#888888',
  residential: '#555555',
  _default:    '#888888',
};

// ── MAP ───────────────────────────────────────────────────────────────────────
const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -4,
  maxZoom: 20,
  zoomControl: true,
});

L.control.scale({ imperial: false, position: 'bottomright' }).addTo(map);

// ── STATE ─────────────────────────────────────────────────────────────────────
let allFeatures = [];
let selectedLayer = null;
let routeLayer = null;
let originPoint = null;  // {latlng, name}
let destPoint   = null;
let pickingMode = null;  // 'origin' | 'dest' | null
let roadGraph   = {};    // nodeKey → [{to, dist, time, geom, streetName}]
let nodeCoords  = {};    // nodeKey → [lat,lng]

// Default speeds for each highway type (km/h)
const DEFAULT_SPEEDS = {
  motorway: 140, motorway_link: 80,
  trunk: 100,    trunk_link: 60,
  primary: 90,   primary_link: 50,
  secondary: 70, secondary_link: 40,
  tertiary: 50,  tertiary_link: 30,
  residential: 30, living_street: 20,
  service: 20,   unclassified: 40,
  pedestrian: 5, footway: 5, path: 5,
  _default: 30,
};

// Car: cannot use pedestrian ways
const CAR_FORBIDDEN = new Set(['pedestrian','footway','path','steps']);

// ── HELPERS ──────────────────────────────────────────────────────────────────
function getRoadStyle(props) {
  const hw = props?.highway || '_default';
  const base = ROAD_STYLES[hw] || ROAD_STYLES._default;
  return base;
}

function getRoadLabel(props) {
  const hw = props?.highway || '';
  return ROAD_TYPE_LABELS[hw] || hw || 'Droga';
}

function getBadgeColor(props) {
  const hw = props?.highway || '_default';
  return ROAD_BADGE_COLORS[hw] || ROAD_BADGE_COLORS._default;
}

function buildInfoRows(props) {
  const skip = ['highway', 'name', 'colour'];
  const labelMap = {
    ref:       'Numer drogi',
    maxspeed:  'Prędkość maks.',
    lanes:     'Liczba pasów',
    oneway:    'Jednokierunkowa',
    surface:   'Nawierzchnia',
    lit:       'Oświetlenie',
    access:    'Dostęp',
    bridge:    'Most',
    tunnel:    'Tunel',
    admin_level:'Poziom admin.',
    population:'Liczba ludności',
    place:     'Typ obszaru',
  };
  return Object.entries(props || {})
    .filter(([k, v]) => !skip.includes(k) && v != null && v !== '')
    .map(([k, v]) => {
      const label = labelMap[k] || k;
      let val = v;
      if (k === 'maxspeed') val = v + ' km/h';
      if (k === 'oneway')   val = v === 'yes' ? 'Tak' : 'Nie';
      if (k === 'lit')      val = v === 'yes' ? 'Tak' : 'Nie';
      if (k === 'bridge')   val = v === 'yes' ? 'Tak' : 'Nie';
      if (k === 'tunnel')   val = v === 'yes' ? 'Tak' : 'Nie';
      return `<div class="info-row"><span class="info-key">${label}</span><span class="info-val">${val}</span></div>`;
    }).join('');
}

// ── INFO PANEL ────────────────────────────────────────────────────────────────
function showInfo(props, isDistrict) {
  const panel = document.getElementById('info-panel');
  const badge = document.getElementById('info-type-badge');
  const name  = document.getElementById('info-name');
  const body  = document.getElementById('info-body');

  if (isDistrict) {
    badge.textContent = 'Dzielnica';
    badge.style.background = '#7aaa7a';
    name.textContent = props?.name || props?.admin_level ? 'Obszar administracyjny' : 'Dzielnica';
  } else {
    badge.textContent = getRoadLabel(props);
    badge.style.background = getBadgeColor(props);
    name.textContent = props?.name || props?.ref || '(bez nazwy)';
  }

  const rows = buildInfoRows(props);
  body.innerHTML = rows || '<div class="info-row"><span class="info-key" style="color:#bbb">Brak dodatkowych danych</span></div>';
  panel.classList.add('visible');
}

function closeInfo() {
  document.getElementById('info-panel').classList.remove('visible');
  if (selectedLayer) {
    // Reset highlight
    try { selectedLayer.setStyle({ opacity: getRoadStyle(selectedLayer.feature?.properties).opacity }); } catch(e) {}
    selectedLayer = null;
  }
}

// ── ROAD GRAPH BUILDER ────────────────────────────────────────────────────────
function nodeKey(latlng) {
  return Math.round(latlng[0]*1e6) + ',' + Math.round(latlng[1]*1e6);
}

function buildRoadGraph(features) {
  roadGraph = {};
  nodeCoords = {};

  features.forEach(f => {
    const hw = f.properties?.highway;
    if (!hw || f.geometry?.type !== 'LineString') return;
    if (CAR_FORBIDDEN.has(hw)) return;

    const coords = f.geometry.coordinates; // [lng,lat]
    const maxspeed = parseFloat(f.properties?.maxspeed) || DEFAULT_SPEEDS[hw] || 30;
    const oneway = f.properties?.oneway === 'yes';
    const name = f.properties?.name || f.properties?.ref || getRoadLabel(f.properties);

    for (let i = 0; i < coords.length - 1; i++) {
      const a = [coords[i][1],   coords[i][0]];   // [lat,lng]
      const b = [coords[i+1][1], coords[i+1][0]];
      const ka = nodeKey(a), kb = nodeKey(b);
      nodeCoords[ka] = a;
      nodeCoords[kb] = b;

      const dx = a[0]-b[0], dy = a[1]-b[1];
      const dist = Math.sqrt(dx*dx+dy*dy) * 111; // approx km (CRS.Simple scaled)
      const time = dist / maxspeed * 60; // minutes
      const geom = [[a[0],a[1]], [b[0],b[1]]];

      if (!roadGraph[ka]) roadGraph[ka] = [];
      if (!roadGraph[kb]) roadGraph[kb] = [];

      roadGraph[ka].push({ to: kb, dist, time, geom, streetName: name });
      if (!oneway) {
        roadGraph[kb].push({ to: ka, dist, time, geom: [[b[0],b[1]],[a[0],a[1]]], streetName: name });
      }
    }
  });
}

// ── DIJKSTRA ──────────────────────────────────────────────────────────────────
function dijkstra(startKey, endKey) {
  const dist = {}, prev = {}, prevEdge = {};
  Object.keys(roadGraph).forEach(k => dist[k] = Infinity);
  dist[startKey] = 0;
  const pq = [[0, startKey]];

  while (pq.length) {
    pq.sort((a,b) => a[0]-b[0]);
    const [d, u] = pq.shift();
    if (d > dist[u]) continue;
    if (u === endKey) break;
    for (const edge of (roadGraph[u] || [])) {
      const nd = d + edge.time;
      if (nd < dist[edge.to]) {
        dist[edge.to] = nd;
        prev[edge.to] = u;
        prevEdge[edge.to] = edge;
        pq.push([nd, edge.to]);
      }
    }
  }

  if (dist[endKey] === Infinity) return null;

  // Reconstruct path
  const edges = [];
  let cur = endKey;
  while (prev[cur]) {
    edges.unshift(prevEdge[cur]);
    cur = prev[cur];
  }
  return { edges, totalTime: dist[endKey] };
}

// ── NEAREST NODE ──────────────────────────────────────────────────────────────
function nearestNode(latlng) {
  let best = null, bestDist = Infinity;
  Object.entries(nodeCoords).forEach(([key, coords]) => {
    const d = (coords[0]-latlng[0])**2 + (coords[1]-latlng[1])**2;
    if (d < bestDist) { bestDist = d; best = key; }
  });
  return best;
}

// ── PICKING MODE ──────────────────────────────────────────────────────────────
function startPicking(mode) {
  pickingMode = mode;
  map.getContainer().classList.add('selecting');
  document.getElementById('pick-hint').style.display = 'block';
  document.getElementById(`pick-${mode}-btn`).classList.add('selecting');
}

map.on('click', e => {
  if (!pickingMode) return;
  const latlng = [e.latlng.lat, e.latlng.lng];
  const nearest = nearestNode(latlng);
  if (!nearest) return;
  const snapped = nodeCoords[nearest];
  setEndpoint(pickingMode, snapped, `${snapped[0].toFixed(5)}, ${snapped[1].toFixed(5)}`);
});

function setEndpoint(mode, latlng, label) {
  map.getContainer().classList.remove('selecting');
  document.getElementById('pick-hint').style.display = 'none';
  document.getElementById(`pick-${mode}-btn`)?.classList.remove('selecting');
  pickingMode = null;

  if (mode === 'origin') {
    originPoint = { latlng, name: label };
    const inp = document.getElementById('origin-input');
    inp.value = label; inp.classList.add('set');
  } else {
    destPoint = { latlng, name: label };
    const inp = document.getElementById('dest-input');
    inp.value = label; inp.classList.add('set');
  }
  document.getElementById('route-btn').disabled = !(originPoint && destPoint);
  updateEndpointMarkers();
}

// ── ENDPOINT MARKERS ──────────────────────────────────────────────────────────
let originMarker = null, destMarker = null;
function updateEndpointMarkers() {
  if (originMarker) map.removeLayer(originMarker);
  if (destMarker)   map.removeLayer(destMarker);
  if (originPoint) {
    originMarker = L.circleMarker(originPoint.latlng, {
      radius:8, color:'#2e7d32', fillColor:'#2e7d32', fillOpacity:1, weight:2
    }).addTo(map).bindTooltip('Start', {permanent:false});
  }
  if (destPoint) {
    destMarker = L.circleMarker(destPoint.latlng, {
      radius:8, color:'#c62828', fillColor:'#c62828', fillOpacity:1, weight:2
    }).addTo(map).bindTooltip('Cel', {permanent:false});
  }
}

// ── AUTOCOMPLETE ──────────────────────────────────────────────────────────────
function onAutoComplete(mode, val) {
  const dropId = mode + '-ac';
  const drop = document.getElementById(dropId);
  if (!val.trim()) { drop.style.display='none'; return; }
  const q = val.toLowerCase();
  const matches = allFeatures
    .filter(f => f.geometry?.type === 'LineString' && !CAR_FORBIDDEN.has(f.properties?.highway))
    .filter(f => {
      const n = (f.properties?.name||'').toLowerCase();
      const r = (f.properties?.ref||'').toLowerCase();
      return n.includes(q) || r.includes(q);
    })
    .slice(0, 6);

  if (!matches.length) { drop.style.display='none'; return; }
  drop.innerHTML = matches.map((f,i) => `
    <div class="ac-item" onclick="selectAC('${mode}',${i})">
      <div class="ac-name">${f.properties?.name || f.properties?.ref || '?'}</div>
      <div class="ac-type">${getRoadLabel(f.properties)}</div>
    </div>`).join('');
  drop._matches = matches;
  drop.style.display = 'block';
}

function selectAC(mode, idx) {
  const drop = document.getElementById(mode+'-ac');
  const f = drop._matches?.[idx];
  if (!f) return;
  drop.style.display = 'none';
  // Use midpoint of the feature as endpoint
  const coords = f.geometry.coordinates;
  const mid = coords[Math.floor(coords.length/2)];
  const latlng = [mid[1], mid[0]];
  const nearest = nearestNode(latlng);
  const snapped = nearest ? nodeCoords[nearest] : latlng;
  const label = f.properties?.name || f.properties?.ref || '?';
  document.getElementById(mode+'-input').value = label;
  setEndpoint(mode, snapped, label);
}

document.addEventListener('click', e => {
  ['origin-ac','dest-ac'].forEach(id => {
    const el = document.getElementById(id);
    if (el && !el.parentElement.contains(e.target)) el.style.display = 'none';
  });
});

// ── FIND ROUTE ────────────────────────────────────────────────────────────────
function findRoute() {
  if (!originPoint || !destPoint) return;
  if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }

  const startKey = nearestNode(originPoint.latlng);
  const endKey   = nearestNode(destPoint.latlng);
  if (!startKey || !endKey) { alert('Nie można znaleźć drogi w pobliżu punktów.'); return; }

  const result = dijkstra(startKey, endKey);
  const resDiv = document.getElementById('route-results');

  if (!result) {
    resDiv.style.display = 'block';
    document.getElementById('route-summary').innerHTML =
      '<div style="color:#c62828;font-size:12px;text-align:center;padding:8px 0">Brak trasy między tymi punktami</div>';
    document.getElementById('turn-list').innerHTML = '';
    return;
  }

  // Draw route
  const latlngs = [];
  result.edges.forEach(e => { latlngs.push(...e.geom.map(c=>[c[0],c[1]])); });
  routeLayer = L.polyline(latlngs, {
    color:'#1a73e8', weight:5, opacity:.9, lineJoin:'round', lineCap:'round'
  }).addTo(map);
  map.fitBounds(routeLayer.getBounds(), { padding:[60,60] });

  // Stats
  const totalDist = result.edges.reduce((s,e)=>s+e.dist,0);
  const totalTime = result.totalTime;
  const h = Math.floor(totalTime/60), m = Math.round(totalTime%60);
  const timeStr = h>0 ? `${h} godz ${m} min` : `${m} min`;
  const distStr = totalDist < 1 ? `${Math.round(totalDist*1000)} m` : `${totalDist.toFixed(1)} km`;

  document.getElementById('route-summary').innerHTML = `
    <div class="route-stat"><div class="rs-val">${timeStr}</div><div class="rs-lbl">Czas</div></div>
    <div class="route-stat"><div class="rs-val">${distStr}</div><div class="rs-lbl">Dystans</div></div>`;

  // Turn-by-turn: group consecutive edges by street name
  const turns = [];
  let curName = null, curDist = 0;
  result.edges.forEach((e, i) => {
    if (e.streetName !== curName) {
      if (curName) turns.push({ name: curName, dist: curDist });
      curName = e.streetName; curDist = e.dist;
    } else {
      curDist += e.dist;
    }
    if (i === result.edges.length-1) turns.push({ name: curName, dist: curDist });
  });

  document.getElementById('turn-list').innerHTML = [
    `<li class="turn-item"><div class="turn-icon start">▶</div><div><div class="turn-street">${originPoint.name}</div></div></li>`,
    ...turns.map((t,i) => {
      const d = t.dist < 1 ? `${Math.round(t.dist*1000)} m` : `${t.dist.toFixed(1)} km`;
      return `<li class="turn-item">
        <div class="turn-icon">${i+1}</div>
        <div><div class="turn-street">${t.name}</div><div class="turn-dist">${d}</div></div>
      </li>`;
    }),
    `<li class="turn-item"><div class="turn-icon dest">🏁</div><div><div class="turn-street">${destPoint.name}</div></div></li>`,
  ].join('');

  resDiv.style.display = 'block';
}

function clearRoute() {
  originPoint = null; destPoint = null; pickingMode = null;
  if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
  if (originMarker) { map.removeLayer(originMarker); originMarker = null; }
  if (destMarker)   { map.removeLayer(destMarker);   destMarker   = null; }
  ['origin','dest'].forEach(m => {
    const inp = document.getElementById(m+'-input');
    inp.value = ''; inp.classList.remove('set');
  });
  document.getElementById('route-btn').disabled = true;
  document.getElementById('route-results').style.display = 'none';
  map.getContainer().classList.remove('selecting');
  document.getElementById('pick-hint').style.display = 'none';
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function loadLayer(url, isDistrict) {
  return fetch(url)
    .then(r => { if (!r.ok) throw new Error('404'); return r.json(); })
    .then(data => {
      if (!isDistrict) {
        allFeatures = data.features || [];
      }

      if (isDistrict) {
        // Districts: polygon fill
        L.geoJSON(data, {
          style: () => ({
            color: '#7aaa7a',
            weight: 2,
            opacity: .7,
            fillColor: '#b4d2b4',
            fillOpacity: .12,
            dashArray: '4 4',
          }),
          onEachFeature(feature, layer) {
            const name = feature.properties?.name;
            if (name) {
              layer.bindTooltip(name, {
                permanent: true,
                direction: 'center',
                className: 'district-label',
              });
            }
            layer.on('click', () => showInfo(feature.properties, true));
          }
        }).addTo(map);
        return;
      }

      // Roads — draw in two passes: casing then fill
      const byType = {};
      (data.features || []).forEach(f => {
        const hw = f.properties?.highway || '_default';
        if (!byType[hw]) byType[hw] = [];
        byType[hw].push(f);
      });

      // Sort types by z-index (lowest first)
      const sortedTypes = Object.keys(byType).sort((a, b) => {
        const za = (ROAD_STYLES[a] || ROAD_STYLES._default).zIndex || 0;
        const zb = (ROAD_STYLES[b] || ROAD_STYLES._default).zIndex || 0;
        return za - zb;
      });

      // Pass 1: casings (thicker, darker)
      sortedTypes.forEach(hw => {
        if (!CASING[hw]) return;
        const style = ROAD_STYLES[hw] || ROAD_STYLES._default;
        L.geoJSON({ type:'FeatureCollection', features: byType[hw] }, {
          style: () => ({
            color: CASING[hw],
            weight: style.weight + 2,
            opacity: style.opacity * .7,
            lineCap: 'round',
            lineJoin: 'round',
          }),
          pointToLayer: () => null,
        }).addTo(map);
      });

      // Pass 2: road fills + interactions
      sortedTypes.forEach(hw => {
        const style = ROAD_STYLES[hw] || ROAD_STYLES._default;
        L.geoJSON({ type:'FeatureCollection', features: byType[hw] }, {
          style: f => ({
            color: style.color,
            weight: style.weight,
            opacity: style.opacity,
            lineCap: 'round',
            lineJoin: 'round',
            dashArray: style.dashArray || null,
          }),
          pointToLayer: () => null,
          onEachFeature(feature, layer) {
            const props = feature.properties || {};
            const label = props.name || props.ref;
            if (label) {
              layer.bindTooltip(label, { sticky: true, direction: 'top', offset: [0, -4] });
            }
            layer.on('click', e => {
              L.DomEvent.stopPropagation(e);
              if (selectedLayer) {
                try { selectedLayer.setStyle({ opacity: getRoadStyle(selectedLayer.feature?.properties).opacity }); } catch(ex) {}
              }
              selectedLayer = layer;
              layer.setStyle({ opacity: 1, weight: style.weight + 2 });
              showInfo(props, false);
            });
            layer.on('mouseover', () => { if (layer !== selectedLayer) layer.setStyle({ weight: style.weight + 1.5 }); });
            layer.on('mouseout',  () => { if (layer !== selectedLayer) layer.setStyle({ weight: style.weight }); });
          }
        }).addTo(map);
      });

      // Count roads + build graph
      const total = data.features?.length || 0;
      document.getElementById('road-count').textContent = `${total} odcinków`;
      buildRoadGraph(data.features || []);

      // Fit bounds
      try {
        const bounds = L.geoJSON(data).getBounds();
        if (bounds.isValid()) map.fitBounds(bounds, { padding: [40, 40] });
      } catch(e) {}
    });
}

// Load both layers
Promise.allSettled([
  loadLayer(ROADS_GEOJSON, false),
  loadLayer(DISTRICT_GEOJSON, true),
]).then(results => {
  if (results[0].status === 'rejected' && results[1].status === 'rejected') {
    // Both failed — show placeholder
    document.getElementById('map').innerHTML += `
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
        text-align:center;font-family:'Noto Sans',sans-serif;color:#999">
        <div style="font-size:40px;margin-bottom:12px">🗺️</div>
        <div style="font-size:16px;font-weight:600;color:#555">Brak plików danych</div>
        <div style="font-size:12px;margin-top:8px;line-height:1.8">
          Umieść pliki <code style="background:#f5f5f5;padding:1px 5px;border-radius:3px">roads.geojson</code>
          i <code style="background:#f5f5f5;padding:1px 5px;border-radius:3px">districts.geojson</code><br>
          w tym samym katalogu co ten plik HTML
        </div>
      </div>`;
    document.getElementById('road-count').textContent = 'Brak danych';
  }
});
</script>
